spring.application.name=Chok

# Database (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/chok?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false

server.port=8080

# Claude API
chok.anthropic.api-key=${ANTHROPIC_API_KEY}
chok.anthropic.model=claude-sonnet-4-6
chok.anthropic.base-url=https://api.anthropic.com/v1/messages

# ?? ???
chok.analysis.weight-technical=0.65
chok.analysis.weight-sentiment=0.35
chok.analysis.news-per-stock=5
chok.analysis.news-lookback-days=3

# Python ???
chok.collector.python-executable=C:/Users/gamej/Documents/Chok/python-collector/.venv/Scripts/python.exe
chok.collector.script-path=collect.py
chok.collector.working-directory=C:/Users/gamej/Documents/Chok/python-collector
chok.collector.timeout-seconds=300

logging.level.com.project.Chok=INFO